name: Docker

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, such as main, a commit SHA, or v0.2.0"
        required: true
        default: main
        type: string
      channel:
        description: "Mutable release channel to update"
        required: true
        type: choice
        options:
          - beta
          - latest

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  TERMINAL_IMAGE: unraid-codex-terminal
  MCP_IMAGE: unraid-codex-terminal-unraid-mcp
  MEDIA_MCP_IMAGE: unraid-codex-terminal-media-mcp
  ISSUE_AGENT_IMAGE: unraid-codex-terminal-media-issue-agent
  UTILITIES_MCP_IMAGE: unraid-codex-terminal-utilities-mcp

jobs:
  media-issue-agent-sil:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Run media MCP checks
        run: |
          npm --prefix media-mcp ci
          npm --prefix media-mcp run check
          npm --prefix media-mcp run test:plex-issues
          npm --prefix media-mcp run test:seerr-issues
          npm --prefix media-mcp run test:arr-commands
          npm --prefix media-mcp run test:bazarr-subtitles
          npm --prefix media-mcp run test:threadfin

      - name: Run media issue agent checks
        run: |
          npm --prefix media-issue-agent ci
          npm --prefix media-issue-agent exec playwright install --with-deps chromium
          npm --prefix media-issue-agent run check
          npm --prefix media-issue-agent test
          npm --prefix media-issue-agent run test:web
          npm --prefix media-issue-agent run sil

  build:
    needs: media-issue-agent-sil
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Compute image tags
        id: image-tags
        shell: bash
        run: |
          set -euo pipefail

          image_sha="$(git rev-parse HEAD)"
          terminal_base="${REGISTRY}/${{ github.repository_owner }}/${TERMINAL_IMAGE}"
          mcp_base="${REGISTRY}/${{ github.repository_owner }}/${MCP_IMAGE}"
          media_mcp_base="${REGISTRY}/${{ github.repository_owner }}/${MEDIA_MCP_IMAGE}"
          issue_agent_base="${REGISTRY}/${{ github.repository_owner }}/${ISSUE_AGENT_IMAGE}"
          utilities_mcp_base="${REGISTRY}/${{ github.repository_owner }}/${UTILITIES_MCP_IMAGE}"
          terminal_tags=("${terminal_base}:${image_sha}")
          mcp_tags=("${mcp_base}:${image_sha}")
          media_mcp_tags=("${media_mcp_base}:${image_sha}")
          issue_agent_tags=("${issue_agent_base}:${image_sha}")
          utilities_mcp_tags=("${utilities_mcp_base}:${image_sha}")

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "branch" ] && [ "${{ github.ref_name }}" = "main" ]; then
            terminal_tags+=("${terminal_base}:main")
            mcp_tags+=("${mcp_base}:main")
            media_mcp_tags+=("${media_mcp_base}:main")
            issue_agent_tags+=("${issue_agent_base}:main")
            utilities_mcp_tags+=("${utilities_mcp_base}:main")
          fi

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            terminal_tags+=("${terminal_base}:${GITHUB_REF_NAME}")
            mcp_tags+=("${mcp_base}:${GITHUB_REF_NAME}")
            media_mcp_tags+=("${media_mcp_base}:${GITHUB_REF_NAME}")
            issue_agent_tags+=("${issue_agent_base}:${GITHUB_REF_NAME}")
            utilities_mcp_tags+=("${utilities_mcp_base}:${GITHUB_REF_NAME}")
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            terminal_tags+=("${terminal_base}:${{ inputs.channel }}")
            mcp_tags+=("${mcp_base}:${{ inputs.channel }}")
            media_mcp_tags+=("${media_mcp_base}:${{ inputs.channel }}")
            issue_agent_tags+=("${issue_agent_base}:${{ inputs.channel }}")
            utilities_mcp_tags+=("${utilities_mcp_base}:${{ inputs.channel }}")
          fi

          {
            echo "image_sha=${image_sha}"
            echo "terminal_tags<<EOF"
            printf '%s\n' "${terminal_tags[@]}"
            echo "EOF"
            echo "mcp_tags<<EOF"
            printf '%s\n' "${mcp_tags[@]}"
            echo "EOF"
            echo "media_mcp_tags<<EOF"
            printf '%s\n' "${media_mcp_tags[@]}"
            echo "EOF"
            echo "issue_agent_tags<<EOF"
            printf '%s\n' "${issue_agent_tags[@]}"
            echo "EOF"
            echo "utilities_mcp_tags<<EOF"
            printf '%s\n' "${utilities_mcp_tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build codex-terminal
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.image-tags.outputs.terminal_tags }}

      - name: Scan codex-terminal
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.TERMINAL_IMAGE }}:${{ steps.image-tags.outputs.image_sha }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.70.0
          format: table
          exit-code: "1"

      - name: Build unraid-mcp
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.unraid-mcp
          platforms: linux/amd64
          load: true
          build-args: |
            UNRAID_MCP_VERSION=1.2.4
          tags: ${{ steps.image-tags.outputs.mcp_tags }}

      - name: Scan unraid-mcp
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MCP_IMAGE }}:${{ steps.image-tags.outputs.image_sha }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.70.0
          format: table
          exit-code: "1"

      - name: Build media-mcp
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.media-mcp
          platforms: linux/amd64
          load: true
          tags: ${{ steps.image-tags.outputs.media_mcp_tags }}

      - name: Scan media-mcp
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.MEDIA_MCP_IMAGE }}:${{ steps.image-tags.outputs.image_sha }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.70.0
          format: table
          exit-code: "1"

      - name: Build media-issue-agent
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.media-issue-agent
          platforms: linux/amd64
          load: true
          tags: ${{ steps.image-tags.outputs.issue_agent_tags }}

      - name: Scan media-issue-agent
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.ISSUE_AGENT_IMAGE }}:${{ steps.image-tags.outputs.image_sha }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.70.0
          format: table
          exit-code: "1"

      - name: Build utilities-mcp
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.utilities-mcp
          platforms: linux/amd64
          load: true
          tags: ${{ steps.image-tags.outputs.utilities_mcp_tags }}

      - name: Scan utilities-mcp
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.UTILITIES_MCP_IMAGE }}:${{ steps.image-tags.outputs.image_sha }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.70.0
          format: table
          exit-code: "1"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push codex-terminal
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r image_tag; do
            [ -n "${image_tag}" ] || continue
            docker push "${image_tag}"
          done <<'EOF'
          ${{ steps.image-tags.outputs.terminal_tags }}
          EOF

      - name: Push unraid-mcp
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r image_tag; do
            [ -n "${image_tag}" ] || continue
            docker push "${image_tag}"
          done <<'EOF'
          ${{ steps.image-tags.outputs.mcp_tags }}
          EOF

      - name: Push media-mcp
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r image_tag; do
            [ -n "${image_tag}" ] || continue
            docker push "${image_tag}"
          done <<'EOF'
          ${{ steps.image-tags.outputs.media_mcp_tags }}
          EOF

      - name: Push media-issue-agent
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r image_tag; do
            [ -n "${image_tag}" ] || continue
            docker push "${image_tag}"
          done <<'EOF'
          ${{ steps.image-tags.outputs.issue_agent_tags }}
          EOF

      - name: Push utilities-mcp
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r image_tag; do
            [ -n "${image_tag}" ] || continue
            docker push "${image_tag}"
          done <<'EOF'
          ${{ steps.image-tags.outputs.utilities_mcp_tags }}
          EOF
