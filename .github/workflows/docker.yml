name: Docker

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, such as main, a commit SHA, or v0.2.0"
        required: true
        default: main
        type: string
      channel:
        description: "Mutable release channel to update"
        required: true
        type: choice
        options:
          - beta
          - latest

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  TERMINAL_IMAGE: unraid-codex-terminal
  MCP_IMAGE: unraid-codex-terminal-unraid-mcp
  MEDIA_MCP_IMAGE: unraid-codex-terminal-media-mcp
  ISSUE_AGENT_IMAGE: unraid-codex-terminal-media-issue-agent
  UTILITIES_MCP_IMAGE: unraid-codex-terminal-utilities-mcp

jobs:
  media-issue-agent-sil:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Run media MCP checks
        run: |
          npm --prefix media-mcp ci
          npm --prefix media-mcp run check
          npm --prefix media-mcp run test:plex-issues
          npm --prefix media-mcp run test:seerr-issues
          npm --prefix media-mcp run test:arr-commands
          npm --prefix media-mcp run test:bazarr-subtitles
          npm --prefix media-mcp run test:repair-capabilities
          npm --prefix media-mcp run test:threadfin

      - name: Run media issue agent checks
        run: |
          npm --prefix media-issue-agent ci
          npm --prefix media-issue-agent exec playwright install --with-deps chromium
          npm --prefix media-issue-agent run check
          npm --prefix media-issue-agent run test:coverage
          npm --prefix media-issue-agent run test:web
          npm --prefix media-issue-agent run sil

  trivy-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Warm Trivy cache
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: Dockerfile
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.70.0
          format: table
          exit-code: "0"
          hide-progress: true

  build-images:
    name: build image (${{ matrix.name }})
    needs:
      - media-issue-agent-sil
      - trivy-cache
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: codex-terminal
            image_env: TERMINAL_IMAGE
            dockerfile: Dockerfile
            build_args: ""
          - name: unraid-mcp
            image_env: MCP_IMAGE
            dockerfile: Dockerfile.unraid-mcp
            build_args: |
              UNRAID_MCP_VERSION=1.2.4
          - name: media-mcp
            image_env: MEDIA_MCP_IMAGE
            dockerfile: Dockerfile.media-mcp
            build_args: ""
          - name: media-issue-agent
            image_env: ISSUE_AGENT_IMAGE
            dockerfile: Dockerfile.media-issue-agent
            build_args: ""
          - name: utilities-mcp
            image_env: UTILITIES_MCP_IMAGE
            dockerfile: Dockerfile.utilities-mcp
            build_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Compute image tags
        id: image-tags
        shell: bash
        env:
          IMAGE_ENV: ${{ matrix.image_env }}
        run: |
          set -euo pipefail

          image_sha="$(git rev-parse HEAD)"
          image_name="${!IMAGE_ENV}"
          image_base="${REGISTRY}/${{ github.repository_owner }}/${image_name}"
          image_tags=("${image_base}:${image_sha}")

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "branch" ] && [ "${{ github.ref_name }}" = "main" ]; then
            image_tags+=("${image_base}:main")
          fi

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            image_tags+=("${image_base}:${GITHUB_REF_NAME}")
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            image_tags+=("${image_base}:${{ inputs.channel }}")
          fi

          {
            echo "image_sha=${image_sha}"
            echo "image_ref=${image_base}:${image_sha}"
            echo "tags<<EOF"
            printf '%s\n' "${image_tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.image-tags.outputs.tags }}

      - name: Scan ${{ matrix.name }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image-tags.outputs.image_ref }}
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          version: v0.70.0
          format: table
          exit-code: "1"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.name }}
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r image_tag; do
            [ -n "${image_tag}" ] || continue
            docker push "${image_tag}"
          done <<'EOF'
          ${{ steps.image-tags.outputs.tags }}
          EOF

  build:
    needs: build-images
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Confirm image builds
        run: |
          if [ "${{ needs.build-images.result }}" != "success" ]; then
            echo "Docker image build or scan matrix did not pass: ${{ needs.build-images.result }}"
            exit 1
          fi
          echo "All Docker image build and scan matrix jobs passed."
