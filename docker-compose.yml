name: unraid-codex-terminal

services:
  codex-terminal:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CODEX_TERMINAL_IMAGE:-ghcr.io/shepemer/unraid-codex-terminal:dev}
    container_name: codex-terminal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - SYS_CHROOT
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
      - /run:rw,nosuid,size=64m
      - /var/run:rw,nosuid,size=64m
    ports:
      - "${CODEX_SSH_PORT:-2222}:2222/tcp"
      - "${CODEX_WEBUI_PORT:-7681}:7681/tcp"
    environment:
      SSH_AUTHORIZED_KEYS: ${SSH_AUTHORIZED_KEYS:-}
      SSH_PASSWORD_LOGIN: ${SSH_PASSWORD_LOGIN:-false}
      SSH_PASSWORD: ${SSH_PASSWORD:-}
      SSH_PASSWORD_HASH: ${SSH_PASSWORD_HASH:-}
      UNRAID_MCP_BEARER_TOKEN: ${UNRAID_MCP_BEARER_TOKEN:-}
      MEDIA_MCP_URL: ${MEDIA_MCP_URL:-http://media-mcp:6971/mcp}
      MEDIA_MCP_BEARER_TOKEN: ${MEDIA_MCP_BEARER_TOKEN:-}
      UTILITIES_MCP_URL: ${UTILITIES_MCP_URL:-http://utilities-mcp:6972/mcp}
      UTILITIES_MCP_BEARER_TOKEN: ${UTILITIES_MCP_BEARER_TOKEN:-}
      WEBUI_ENABLED: ${WEBUI_ENABLED:-true}
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      WEBUI_USERNAME: ${WEBUI_USERNAME:-codex}
      WEBUI_PASSWORD: ${WEBUI_PASSWORD:-}
      WEBUI_PORT: 7681
      WEBUI_MAX_CLIENTS: ${WEBUI_MAX_CLIENTS:-5}
      WEBUI_TMUX_SESSION: ${WEBUI_TMUX_SESSION:-codex}
      WEBUI_LOG_LEVEL: ${WEBUI_LOG_LEVEL:-1}
      AUTO_LAUNCH_CODEX: ${AUTO_LAUNCH_CODEX:-true}
      CODEX_WEBUI_BYPASS_APPROVALS: ${CODEX_WEBUI_BYPASS_APPROVALS:-true}
      CODEX_UPDATE_ON_START: ${CODEX_UPDATE_ON_START:-true}
      CODEX_NPM_VERSION: ${CODEX_NPM_VERSION:-latest}
      CODEX_UPDATE_ON_START_TIMEOUT: ${CODEX_UPDATE_ON_START_TIMEOUT:-180}
    volumes:
      - ${CODEX_CONFIG_DIR:-./data/codex-terminal}:/config:rw
      # Optional diagnostic mounts. Keep them read-only and narrow.
      # - /var/log:/mnt/unraid/logs:ro
      # - /boot/config/plugins/dockerMan/templates-user:/mnt/unraid/docker-templates:ro
    networks:
      - codex-mgmt
    depends_on:
      unraid-mcp:
        condition: service_started

  unraid-mcp:
    build:
      context: .
      dockerfile: Dockerfile.unraid-mcp
      args:
        UNRAID_MCP_VERSION: "1.2.4"
    image: ${UNRAID_MCP_IMAGE:-ghcr.io/shepemer/unraid-codex-terminal-unraid-mcp:1.2.4-dev}
    container_name: unraid-mcp
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
      - /run:rw,nosuid,size=32m
    environment:
      UNRAID_API_URL: ${UNRAID_API_URL:-}
      UNRAID_API_KEY: ${UNRAID_API_KEY:-}
      UNRAID_MCP_BEARER_TOKEN: ${UNRAID_MCP_BEARER_TOKEN:-}
      UNRAID_MCP_TRANSPORT: ${UNRAID_MCP_TRANSPORT:-streamable-http}
      UNRAID_MCP_HOST: ${UNRAID_MCP_HOST:-0.0.0.0}
      UNRAID_MCP_PORT: ${UNRAID_MCP_PORT:-6970}
    volumes:
      - ${UNRAID_MCP_STATE_DIR:-./data/unraid-mcp/state}:/home/mcp/.unraid-mcp:rw
      - ${UNRAID_MCP_LOG_DIR:-./data/unraid-mcp/logs}:/app/logs:rw
      - ${UNRAID_MCP_BACKUP_DIR:-./data/unraid-mcp/backups}:/app/backups:rw
    networks:
      - codex-mgmt

  media-mcp:
    profiles:
      - media
    build:
      context: .
      dockerfile: Dockerfile.media-mcp
    image: ${MEDIA_MCP_IMAGE:-ghcr.io/shepemer/unraid-codex-terminal-media-mcp:dev}
    container_name: media-mcp
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment:
      MEDIA_MCP_BEARER_TOKEN: ${MEDIA_MCP_BEARER_TOKEN:-}
      MEDIA_MCP_HOST: ${MEDIA_MCP_HOST:-0.0.0.0}
      MEDIA_MCP_PORT: ${MEDIA_MCP_PORT:-6971}
      MEDIA_MCP_REQUEST_TIMEOUT_MS: ${MEDIA_MCP_REQUEST_TIMEOUT_MS:-30000}
      SONARR_URL: ${SONARR_URL:-}
      SONARR_API_KEY: ${SONARR_API_KEY:-}
      RADARR_URL: ${RADARR_URL:-}
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      PROWLARR_URL: ${PROWLARR_URL:-}
      PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      QBITTORRENT_URL: ${QBITTORRENT_URL:-}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-}
      NZBGET_URL: ${NZBGET_URL:-}
      NZBGET_USERNAME: ${NZBGET_USERNAME:-}
      NZBGET_PASSWORD: ${NZBGET_PASSWORD:-}
      SEERR_URL: ${SEERR_URL:-}
      SEERR_API_KEY: ${SEERR_API_KEY:-}
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      BAZARR_URL: ${BAZARR_URL:-}
      BAZARR_API_KEY: ${BAZARR_API_KEY:-}
    networks:
      - codex-mgmt

  utilities-mcp:
    profiles:
      - utilities
    build:
      context: .
      dockerfile: Dockerfile.utilities-mcp
    image: ${UTILITIES_MCP_IMAGE:-ghcr.io/shepemer/unraid-codex-terminal-utilities-mcp:dev}
    container_name: utilities-mcp
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment:
      UTILITIES_MCP_BEARER_TOKEN: ${UTILITIES_MCP_BEARER_TOKEN:-}
      UTILITIES_MCP_HOST: ${UTILITIES_MCP_HOST:-0.0.0.0}
      UTILITIES_MCP_PORT: ${UTILITIES_MCP_PORT:-6972}
      UTILITIES_MCP_REQUEST_TIMEOUT_MS: ${UTILITIES_MCP_REQUEST_TIMEOUT_MS:-30000}
      SCRUTINY_URL: ${SCRUTINY_URL:-}
      SCRUTINY_BASE_PATH: ${SCRUTINY_BASE_PATH:-}
    networks:
      - codex-mgmt

networks:
  codex-mgmt:
    name: codex-mgmt
    driver: bridge
